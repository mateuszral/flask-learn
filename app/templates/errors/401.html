{% extends "base.html" %}
{% block title %}Unauthorized Access{% endblock %}
{% block head %}
    {{ super() }}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/404.css') }}">
{% endblock %}

{% block content %}
    <section class="error-wrapper">
        <div class="error-card">
            <div class="error-code">401</div>
            <div class="error-title">Unauthorized Access</div>
            <div class="error-description">
                You need to log in to access this page. Please log in and try again.
            </div>

            <div class="error-actions">
                <a href="{{ url_for('main.home') }}" class="btn-primary">Go Home</a>
                <a href="javascript:history.back()" class="btn-secondary">Go Back</a>
                <a href="{{ url_for('auth.login_form') }}" class="btn-secondary">Log In</a>
            </div>
        </div>
    </section>
{% endblock %}
